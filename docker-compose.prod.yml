services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: invoice-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-invoiceuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-invoicepassword}
      POSTGRES_DB: ${DB_NAME:-invoicedb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-invoiceuser} -d ${DB_NAME:-invoicedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice-backend-prod
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-invoiceuser}
      DB_PASSWORD: ${DB_PASSWORD:-invoicepassword}
      DB_NAME: ${DB_NAME:-invoicedb}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET harus diset di .env.prod}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-900}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-frontend-prod
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:

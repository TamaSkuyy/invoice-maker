services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: invoice-postgres
    environment:
      POSTGRES_USER: invoiceuser
      POSTGRES_PASSWORD: invoicepassword
      POSTGRES_DB: invoicedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoiceuser -d invoicedb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: invoice-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: invoiceuser
      DB_PASSWORD: invoicepassword
      DB_NAME: invoicedb
      JWT_SECRET: your-secret-key-change-in-production-min-32-chars
      JWT_EXPIRATION: 86400
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
